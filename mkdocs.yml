site_name: Incident Management
site_description: Professionelt videnssite om incident management baseret på ISO, NIST og læringsmål for IT-hændelseshåndtering
site_url: https://example.org/incident-management
repo_name: Rsjo53020/IncidentManagementWebSite
repo_url: https://github.com/Rsjo53020/IncidentManagementWebSite

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Rsjo53020/IncidentManagementWebSite
  homepage: index.md

extra_css:
  - stylesheets/extra.css
  - stylesheets/incident-management.css
extra_javascript:
  - javascripts/incident-management.js
docs_dir: docs

theme:
  name: material
  language: da
  logo: assets/shield.svg
  favicon: /assets/shield.svg
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/info-16
      tip: octicons/light-bulb-16
      warning: octicons/alert-16
      danger: octicons/zap-16
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Skift til mørk tilstand
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Skift til lys tilstand
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - announce.dismiss

plugins:
  - search
  - blog

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret

nav:
  - Hjem:
      - Startside: index.md
      - Introduktion og læseguide: 00-Home/reading_strategy.md
  - Projektet generelt:
      
      - Indledende grov projektplanlægning: 01-InGeneral/project_plan.md
      - Faktisk projektplan: 01-InGeneral/actual_project_plan.md
      - Projektets milepæle: 01-InGeneral/project_milestones.md
      - Refleksioner over projektforløbet: 01-InGeneral/learning_and_experiences.md
  - Fundament:
      - Formål og anvendelse: 02-Foundation/purpose_and_use.md
      - Centrale begreber og definitioner: 02-Foundation/key_concepts.md
  - Standarder og frameworks:
      - ISO og NIST i samspil: 03-Frameworks/iso_and_nist.md
      - NIST CSF 2.0: 03-Frameworks/csf20.md
      - ISO 22320: 03-Frameworks/iso22320.md
  - Proces og plan:
      - instruktion til den generiske incident management plan: 04-Proces/process.md
      - Generisk incident management-plan: 04-Proces/generic_plan.md
      - Roller, ansvar og eskalation: 04-Proces/roles_and_responsibilities.md
      - Playbooks og arbejdsgange: 04-Proces/playbooks.md
  - Operationel håndtering:
      - Detektion, analyse og triage: 05-OperationalManagement/detection_analysis_triage.md
      - Inddæmning, eradikering og recovery: 05-OperationalManagement/containmente_radication_recovery.md
      - Kommunikation og rapportering: 05-OperationalManagement/communication_and_reporting.md
  - Læring og styring:
      - Øvelser, metrics og modenhed: 06-LearningAndGovernance/exercises_metrics_maturity.md
      - Dokumentation og auditspor: 06-LearningAndGovernance/documentation_and_audittrail.md
  - Undervisning:
      - Fagbeskrivelse og læringsmål: 07-Education/educational_goals.md
      - Studieaktiviteter og cases: 07-Education/academic_activities.md
  - Kilder: 00-Home/sources.md