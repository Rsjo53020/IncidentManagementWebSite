site_name: Incident Management
site_description: Professionelt videnssite om incident management baseret på ISO, NIST og læringsmål for IT-hændelseshåndtering
site_url: https://example.org/incident-management
repo_name: Rsjo53020/IncidentManagementWebSite
repo_url: https://github.com/Rsjo53020/IncidentManagementWebSite

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Rsjo53020/IncidentManagementWebSite
  homepage: index.md

extra_css:
  - stylesheets/extra.css
  - stylesheets/incident-management.css
extra_javascript:
  - javascripts/incident-management.js
docs_dir: docs

theme:
  name: material
  language: da
  logo: assets/shield.svg
  favicon: /assets/shield.svg
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/info-16
      tip: octicons/light-bulb-16
      warning: octicons/alert-16
      danger: octicons/zap-16
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Skift til mørk tilstand
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Skift til lys tilstand
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - announce.dismiss

plugins:
  - search
  - blog

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret

nav:
  - Hjem: index.md
  - Generelt: 
      - Projekt planlægning og refleksion: 01-Grundlag/projektplan.md
      - Projektets milepæle: projektetsmilepæle.md
  - Fundament:
      - Formål og anvendelse: 01-Grundlag/formaal-og-anvendelse.md
      - Centrale begreber: 01-Grundlag/centrale-begreber.md
  - Standarder og frameworks:
      - ISO og NIST i samspil: 02-Frameworks/iso-og-nist.md
      - NIST CSF 2.0: 02-Frameworks/csf20.md 
      - ISO 22320: 02-Frameworks/iso22320.md
  - Proces og plan:
      - instruktion til den generiske incident management plan: 03-Proces/instruktion.md
      - Generisk incident management-plan: 03-Proces/generisk-plan.md
      - Roller, ansvar og eskalation: 03-Proces/roller-og-ansvar.md
      - Playbooks og arbejdsgange: 03-Proces/playbooks.md
  - Operationel håndtering:
      - Detektion, analyse og triage: 04-Operationel-håndtering/detektion-analyse-triage.md
      - Inddæmning, eradikering og recovery: 04-Operationel-håndtering/inddaemning-eradikering-recovery.md
      - Kommunikation og rapportering: 04-Operationel-håndtering/kommunikation-og-rapportering.md
  - Læring og styring:
      - Øvelser, metrics og modenhed: 05-Læring-og-governance/oevelser-metrics-modenhed.md
      - Dokumentation og auditspor: 05-Læring-og-governance/dokumentation-og-auditspor.md
  - Undervisning:
      - Fagbeskrivelse og læringsmål: 06-Undervisning/laeringsmaal.md
      - Studieaktiviteter og cases: 06-Undervisning/studieaktiviteter.md
  - Kilder: kilder.md
