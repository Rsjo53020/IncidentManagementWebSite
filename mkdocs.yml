site_name: Incident Management
site_description: Professionelt videnssite om incident management baseret på ISO, NIST og læringsmål for IT-hændelseshåndtering
site_url: https://rsjo53020.github.io/IncidentManagementWebSite/
repo_name: Rsjo53020/IncidentManagementWebSite
repo_url: https://github.com/Rsjo53020/IncidentManagementWebSite

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Rsjo53020/IncidentManagementWebSite
  homepage: index.md

extra_css:
  - stylesheets/extra.css
  - stylesheets/incident-management.css
extra_javascript:
  - javascripts/incident-management.js
  - javascripts/refleksion-plan.js
  - javascripts/checklist.js
docs_dir: docs

theme:
  name: material
  language: da
  logo: assets/shield.svg
  favicon: /assets/shield.svg
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/info-16
      tip: octicons/light-bulb-16
      warning: octicons/alert-16
      danger: octicons/zap-16
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Skift til mørk tilstand
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Skift til lys tilstand
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - announce.dismiss

plugins:
  - search
  - blog

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret

nav:
  - Hjem:
      - Startside: index.md
      - Læseguide: 00-Home/reading_strategy.md
      - Studieordning: 00-Home/educational_goals.md
  - Projektet generelt:
      - Indledende projektplanlægning: 01-InGeneral/project_plan.md
      - Endelig projektplan: 01-InGeneral/actual_project_plan.md
      - Projektets milepæle: 01-InGeneral/project_milestones.md
      - Samlet refleksion over  projektforløbet: 01-InGeneral/learning_and_experiences.md
  - Fundament:
      - Formål og anvendelse: 02-Foundation/purpose_and_use.md
      - Centrale begreber og definitioner: 02-Foundation/key_concepts.md
  - Standarder og frameworks:
      - ISO og NIST i samspil: 03-Frameworks/iso_and_nist.md
      - NIST CSF 2.0: 03-Frameworks/csf20.md
      - ISO 22320: 03-Frameworks/iso22320.md
  - Generisk model:
      - Konstruktion: 04-GenericPlan/process.md
      - Generisk incident management model: 04-GenericPlan/generic_plan.md
      - Tjekliste for incident management model: 04-GenericPlan/checklist.md
  - Proces og plan:
      - FØR Styringsgrundlag og governance: 05-Proces/governance.md
      - FØR forberedelsesfase: 05-Proces/preparation.md
  - Operationel håndtering:
      - UNDER detektions- og registreringsfase: 06-OperationalManagement/detect_report.md
      - UNDER triage- og vurderingsfase: 06-OperationalManagement/triage_assessment.md
      - UNDER analyse- og responsfase: 06-OperationalManagement/analysis_response.md
  - Læring og styring:
      - EFTER recover fase: 07-LearningAndGovernance/recover.md
      - EFTER læring og forbedring: 07-LearningAndGovernance/lessons_learned.md
  - Kilder: 00-Home/sources.md